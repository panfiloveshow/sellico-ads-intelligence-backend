<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sellico Extension Settings</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: linear-gradient(180deg, #fffaf0 0%, #f8fbff 100%);
      }
      .shell {
        max-width: 760px;
        margin: 0 auto;
        background: rgba(255,255,255,0.88);
        border: 1px solid rgba(15,23,42,0.08);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 70px rgba(15,23,42,0.08);
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 4px 0 0;
        color: #667085;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        border: 1px solid #d0d5dd;
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      button {
        margin-top: 18px;
        border: 0;
        border-radius: 12px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #f59e0b;
        color: #1f2937;
      }
      .status {
        margin-top: 14px;
        min-height: 20px;
        color: #475467;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="url(#logoGrad)"/>
          <text x="50" y="68" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="white" text-anchor="middle">S</text>
        </svg>
        <div>
          <h1 style="margin: 0; font-size: 24px;">Sellico Ads Intelligence</h1>
          <p style="margin: 4px 0 0; color: #667085;">Настрой backend и доступ, чтобы расширение могло автоматически собирать live-данные в кабинете WB.</p>
        </div>
      </div>
      <form id="settings-form" class="grid">
        <label>
          Backend URL
          <input id="backendUrl" type="text" placeholder="http://127.0.0.1:8080" />
        </label>
        <label>
          Access token
          <input id="accessToken" type="password" placeholder="Автоматически из cookies sellico.ru (можно оставить пустым)" />
        </label>
        <label>
          Workspace ID
          <input id="workspaceId" type="text" placeholder="UUID workspace" />
        </label>
        <label class="row">
          <input id="autoCapture" type="checkbox" />
          Автоматически собирать context, snapshots и UI signals на поддержанных страницах
        </label>
        <div style="display: flex; gap: 10px;">
          <button type="submit">Сохранить</button>
          <button type="button" id="test-connection" style="background: #e5e7eb; color: #374151;">Проверить подключение</button>
        </div>
        <div class="status" id="status"></div>
      </form>
    </div>
    <script src="options.js"></script>
  </body>
  </html>
