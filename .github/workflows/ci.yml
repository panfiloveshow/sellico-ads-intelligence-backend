name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Action versions are pinned to a specific minor (e.g. @v4.2.2). Dependabot
# (.github/dependabot.yml) auto-converts these to immutable SHAs on the next
# update PR.

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate OpenAPI YAML
        run: ruby -e 'require "yaml"; YAML.load_file("openapi/openapi.yaml"); puts "openapi yaml ok"'

      - name: OpenAPI ↔ router drift check
        run: go run ./tools/check-openapi-drift

      - name: Install CI guard tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq

      - name: Real data only guard
        run: bash scripts/check-real-data-only.sh

      - name: Prepare compose env
        run: cp .env.prod.example .env

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Build API and worker
        run: |
          go build ./cmd/api
          go build ./cmd/worker

      - name: Run test suite
        run: go test -timeout 120s -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: coverage.out

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # The container action ships an older Go runtime and cannot load modules
      # requiring Go 1.25. The baseline wrapper runs the full current scanner and
      # fails on every finding not explicitly present in the checked-in baseline.
      - name: Run gosec
        run: bash scripts/check-gosec-baseline.sh

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
