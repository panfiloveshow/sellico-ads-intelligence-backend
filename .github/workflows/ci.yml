name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Action versions are pinned to a specific minor (e.g. @v4.2.2). Dependabot
# (.github/dependabot.yml) auto-converts these to immutable SHAs on the next
# update PR.

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate OpenAPI YAML
        run: ruby -e 'require "yaml"; YAML.load_file("openapi/openapi.yaml"); puts "openapi yaml ok"'

      - name: OpenAPI ↔ router drift check
        run: go run ./tools/check-openapi-drift

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Build API and worker
        run: |
          go build ./cmd/api
          go build ./cmd/worker

      - name: Run test suite
        run: go test -timeout 120s -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: coverage
          path: coverage.out

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      # gosec and trivy actions previously tracked @master — supply-chain risk if
      # the action repo gets compromised. Pin to released tags so Dependabot can
      # surface upgrades explicitly.
      - name: Run gosec
        uses: securego/gosec@v2.21.4
        with:
          args: -exclude-generated ./...

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
