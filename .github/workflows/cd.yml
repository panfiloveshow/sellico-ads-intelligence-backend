name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Action versions are pinned to a specific minor (e.g. @v4.2.2). Dependabot
# (.github/dependabot.yml) auto-converts these to immutable SHAs on the next
# update PR — pinning by version first keeps the diff readable.

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        target: [api, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          build-args: TARGET=${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 10

    steps:
      # Secrets are passed to the remote via `envs:` so they appear as $VAR on the
      # remote shell — never interpolated into the script body where they could
      # land in logs or process listings. The deploy script reads them via env.
      - name: Deploy to Timeweb VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Fail the step if the remote host key doesn't match — protects against
          # MITM and DNS hijack on the deploy path. Get the fingerprint with:
          #   ssh-keyscan -t ed25519 <host> | ssh-keygen -lf - -E sha256
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_PATH,GITHUB_SHA
          script_stop: true
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/sellico}"
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL "$archive_url" -o "$tmpdir/source.tar.gz"
            else
              wget -qO "$tmpdir/source.tar.gz" "$archive_url"
            fi
            tar -xzf "$tmpdir/source.tar.gz" -C "$tmpdir"
            srcdir="$(find "$tmpdir" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            cat > "$tmpdir/deploy.override.yml" <<EOF
            services:
              api:
                image: ghcr.io/${GITHUB_REPOSITORY}-api:latest
                build: null
              worker:
                image: ghcr.io/${GITHUB_REPOSITORY}-worker:latest
                build: null
              migrate:
                volumes:
                  - $srcdir/migrations:/migrations:ro
            EOF
            # Token is read from env — never echoed, never interpolated.
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml -f "$tmpdir/deploy.override.yml" pull api worker
            docker compose -f docker-compose.prod.yml -f "$tmpdir/deploy.override.yml" run --rm migrate
            docker compose -f docker-compose.prod.yml -f "$tmpdir/deploy.override.yml" up -d api worker
            docker logout ghcr.io
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
