    # --- Settings schemas ---
    RecommendationThresholds:
      type: object
      description: Per-workspace recommendation engine thresholds. Zero/missing values use defaults.
      properties:
        campaign_high_impressions:
          type: integer
          description: "Min impressions to trigger low-CTR alert (default: 1000)"
        campaign_zero_orders_click:
          type: integer
          description: "Min clicks to trigger zero-orders alert (default: 40)"
        campaign_high_cpc:
          type: number
          description: "CPC threshold for bid pressure alert (default: 50)"
        campaign_poor_cpo:
          type: number
          description: "CPO threshold for bid pressure alert (default: 1500)"
        campaign_raise_bid_clicks:
          type: integer
          description: "Min clicks to trigger raise-bid suggestion (default: 40)"
        campaign_raise_bid_orders:
          type: integer
          description: "Min orders to trigger raise-bid suggestion (default: 5)"
        campaign_strong_roas:
          type: number
          description: "ROAS threshold for scale-up suggestion (default: 4.0)"
        phrase_high_impressions:
          type: integer
          description: "Min phrase impressions for low-CTR alert (default: 500)"
        phrase_bid_raise_clicks:
          type: integer
          description: "Min phrase clicks for bid-raise suggestion (default: 10)"
        position_drop_threshold:
          type: integer
          description: "Position drop delta to trigger alert (default: 10)"
        serp_competitor_top:
          type: integer
          description: "Top-N SERP positions to monitor for competitor alerts (default: 5)"

    TelegramSettings:
      type: object
      properties:
        bot_token:
          type: string
          description: Telegram Bot API token
        chat_id:
          type: string
          description: Telegram chat/group ID for notifications
        enabled:
          type: boolean

    EmailNotificationSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Enables email report delivery when an email sender is configured.
        recipients:
          type: array
          items:
            type: string
            format: email
          description: Real report recipients for owner, agency, or client email reports.
        weekly_digest:
          type: boolean
          description: Send weekly WB ads digest to the configured recipients.
        daily_owner_digest:
          type: boolean
          description: Send daily owner report to the configured recipients.
        client_reports:
          type: boolean
          description: Send client-ready WB ads audit reports to the configured recipients.

    NotificationSettings:
      type: object
      properties:
        telegram:
          $ref: "#/components/schemas/TelegramSettings"
        email:
          $ref: "#/components/schemas/EmailNotificationSettings"

    WorkspaceSettings:
      type: object
      properties:
        recommendation_thresholds:
          $ref: "#/components/schemas/RecommendationThresholds"
        notifications:
          $ref: "#/components/schemas/NotificationSettings"
        automation:
          $ref: "#/components/schemas/AutomationSettings"

    WorkspaceSettingsInput:
      type: object
      description: Partial update — only non-null fields are merged.
      properties:
        recommendation_thresholds:
          $ref: "#/components/schemas/RecommendationThresholds"
        notifications:
          $ref: "#/components/schemas/NotificationSettings"
        automation:
          $ref: "#/components/schemas/AutomationSettings"

    AutomationSettings:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        manual_hold: { type: boolean }
        hold_reason: { type: string }
        max_bid_changes_per_day: { type: integer, minimum: 0 }

    StrategyRolloutInput:
      type: object
      required: [desired_mode]
      properties:
        desired_mode: { type: string, enum: [live, shadow] }
        manual_hold: { type: boolean }
        hold_reason: { type: string }

    StrategyBindingRollout:
      type: object
      properties:
        binding_id: { type: string, format: uuid }
        strategy_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        desired_mode: { type: string, enum: [live, shadow] }
        state: { type: string, enum: [shadow_validating, live, blocked, manual_hold] }
        manual_hold: { type: boolean }
        hold_reason: { type: string }
        last_block_code: { type: string }
        last_block_detail: { type: string }
        validation_started_at: { type: string, format: date-time }
        live_enabled_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }

    StrategyEvaluationFact:
      type: object
      required: [id, run_id, code, status, outcome, source, value, observed_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        code: { type: string }
        status: { type: string, enum: [observed, passed, blocked, error] }
        outcome: { type: string, enum: [blocked, ready_no_change, would_apply, claimed, applied, failed, unknown] }
        source: { type: string }
        value: { type: object, additionalProperties: true }
        observed_at: { type: string, format: date-time }

    StrategyEvaluationRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        strategy_id: { type: string, format: uuid }
        strategy_binding_id: { type: string, format: uuid }
        campaign_id: { type: string, format: uuid, nullable: true }
        product_id: { type: string, format: uuid, nullable: true }
        automation_level: { type: integer, minimum: 1, maximum: 4 }
        rollout_state: { type: string, enum: [shadow_validating, live, blocked, manual_hold] }
        apply_requested: { type: boolean }
        outcome: { type: string, enum: [evaluating, no_decision, blocked, shadow_decision, claimed, applied, failed, unknown] }
        reason_code: { type: string }
        reason_detail: { type: string }
        proposed_actions: { type: integer }
        applied_actions: { type: integer }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        facts: { type: array, items: { $ref: "#/components/schemas/StrategyEvaluationFact" } }

    StrategyActivityEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            strategy_id: { type: string, format: uuid }
            status: { type: string, enum: [shadow_validating, live, blocked, manual_hold, idle] }
            next_check_at: { type: string, format: date-time, nullable: true }
            campaigns: { type: array, items: { type: object } }
            latest_run: { $ref: "#/components/schemas/StrategyEvaluationRun" }
            facts: { type: array, items: { $ref: "#/components/schemas/StrategyEvaluationFact" } }
            blockers: { type: array, items: { type: object } }
            data_freshness: { type: object }

    CampaignDailyLimitInput:
      type: object
      required: [daily_limit, enabled]
      properties:
        daily_limit: { type: integer, format: int64, minimum: 0 }
        enabled: { type: boolean }

    CampaignDailyLimitEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            campaign_id: { type: string, format: uuid }
            daily_limit: { type: integer, format: int64 }
            enabled: { type: boolean }
            pause_when_reached: { type: boolean }
            resume_next_day: { type: boolean }
            updated_at: { type: string, format: date-time }

    WorkspaceSettingsEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/WorkspaceSettings"

    ThresholdsEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RecommendationThresholds"

    StrategyParams:
      type: object
      description: Polymorphic — set fields relevant to the strategy type.
      properties:
        target_acos: { type: number, format: double }
        target_roas: { type: number, format: double }
        max_acos: { type: number, format: double }
        base_multiplier: { type: number, format: double }
        hourly_multipliers:
          type: object
          additionalProperties: { type: number, format: double }
        weekday_multipliers:
          type: object
          additionalProperties: { type: number, format: double }
        min_bid: { type: integer }
        max_bid: { type: integer }
        max_cpc:
          type: number
          format: double
          description: Optional maximum real CPC before autopilot bid increases are blocked.
        max_cpo:
          type: number
          format: double
          description: Optional maximum real CPO before autopilot bid increases are blocked. Requires real order evidence.
        automation_level:
          type: integer
          enum: [1, 2, 3, 4]
          default: 1
          description: Trust level for strategy execution. Levels 1-2 are analytics/semi-auto and never auto-apply actions; levels 3-4 can auto-apply within guardrails. Defaults to 1.
        max_change_percent:
          type: number
          format: double
          description: Maximum bid change per autopilot action. Defaults to 15.
        min_clicks: { type: integer }
        lookback_days: { type: integer }
        min_stock_for_increase:
          type: integer
          description: Minimum real product stock required before bid automation can increase a bid. Defaults to 1.
        cooldown_minutes:
          type: integer
          description: Minimum minutes between automated bid changes for the same campaign/product. Defaults to 120.
        max_changes_per_day:
          type: integer
          description: Maximum automated bid changes per campaign/product in 24 hours. Defaults to 3.
        max_data_age_hours:
          type: integer
          description: Maximum age of synced campaign stats before autopilot skips bid changes. Defaults to 36.
        allow_increase_without_stock:
          type: boolean
          description: Explicit override for increasing bids when stock data is unavailable. Defaults to false.

    Strategy:
      type: object
      required: [name, type, seller_cabinet_id]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        seller_cabinet_id: { type: string, format: uuid }
        name: { type: string }
        type:
          type: string
          enum: [acos, roas, anti_sliv, dayparting, search_playbook]
        params:
          $ref: "#/components/schemas/StrategyParams"
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        bindings:
          type: array
          items:
            $ref: "#/components/schemas/StrategyBinding"

    StrategyBinding:
      type: object
      properties:
        id: { type: string, format: uuid }
        strategy_id: { type: string, format: uuid }
        campaign_id: { type: string, format: uuid, nullable: true }
        product_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    BidDecisionObservation:
      type: object
      description: Counterfactual bid decision that was not sent to WB.
      required: [id, workspace_id, seller_cabinet_id, strategy_id, strategy_binding_id, campaign_id, wb_campaign_id, wb_product_id, placement, old_bid, proposed_bid, reason, metrics, automation_level, bid_observed_at, first_seen_at, last_seen_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        seller_cabinet_id: { type: string, format: uuid }
        strategy_id: { type: string, format: uuid }
        strategy_binding_id: { type: string, format: uuid }
        campaign_id: { type: string, format: uuid }
        product_id: { type: string, format: uuid, nullable: true }
        wb_campaign_id: { type: integer, format: int64 }
        wb_product_id: { type: integer, format: int64 }
        placement: { type: string }
        old_bid: { type: integer }
        proposed_bid: { type: integer }
        reason: { type: string }
        metrics: { type: object, additionalProperties: true }
        automation_level: { type: integer, enum: [1, 2, 3, 4] }
        bid_observed_at: { type: string, format: date-time }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    BidDecisionObservationListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/BidDecisionObservation" }
        meta: { $ref: "#/components/schemas/Meta" }

    StrategyListEnvelope:
