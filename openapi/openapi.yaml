  # --- Extension live capture (browser extension publishes events here) ---
  /api/v1/extension/session/start:
    post:
      tags: [Extension]
      summary: Start a live capture session
      description: Browser extension calls this on page load to register itself.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      responses:
        "201": { description: Session created, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/page-context:
    post:
      tags: [Extension]
      summary: Publish current WB page context (cabinet ID, campaign ID from URL)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                cabinet_external_id: { type: string }
                campaign_external_id: { type: string }
      responses:
        "200": { description: Recorded, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/bid-snapshots:
    post:
      tags: [Extension]
      summary: Submit a bid snapshot captured from the WB cabinet UI
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_external_id: { type: string }
                phrase: { type: string }
                bid: { type: integer, description: kopecks }
                captured_at: { type: string, format: date-time }
      responses:
        "201": { description: Snapshot stored, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/position-snapshots:
    post:
      tags: [Extension]
      summary: Submit a search-position snapshot captured from WB SERP
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_wb_id: { type: integer }
                phrase: { type: string }
                position: { type: integer }
                page: { type: integer }
                captured_at: { type: string, format: date-time }
      responses:
        "201": { description: Snapshot stored, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/ui-signals:
    post:
      tags: [Extension]
      summary: Generic UI interaction signal (clicks on bid input, etc.)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signal_type: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        "200": { description: Signal recorded, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/network-captures/batch:
    post:
      tags: [Extension]
      summary: Bulk-upload XHR captures from the extension's page-bridge
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                captures:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string }
                      method: { type: string }
                      status: { type: integer }
                      response_body: { type: string }
                      captured_at: { type: string, format: date-time }
      responses:
        "200": { description: Batch accepted, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/dom-row-snapshots:
    post:
      tags: [Extension]
      summary: Bulk-upload visible WB cabinet table rows as evidence
      description: |
        Stores real DOM rows visible in the seller's WB cabinet as support
        evidence. These rows are not used to backfill spend, revenue, orders,
        or other official API metrics.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [page_type, table_role, row_key, visible_text]
                    properties:
                      page_type: { type: string, enum: [search, product, campaign, query, auction, cabinet] }
                      table_role: { type: string, enum: [campaigns, products, queries, bids, stats, finance, unknown] }
                      row_key: { type: string, maxLength: 300 }
                      query: { type: string }
                      region: { type: string }
                      visible_text: { type: string, maxLength: 1200 }
                      cells: { type: array, items: { type: object, additionalProperties: true } }
                      metadata: { type: object, additionalProperties: true }
                      captured_at: { type: string, format: date-time }
      responses:
        "201": { description: DOM row snapshots accepted, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/campaign:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB campaign page
      description: |
        Used by the extension's content script to render the floating
        Sellico widget overlaid on seller.wildberries.ru/campaigns/{id}.
        Returns the smallest payload needed for the widget — primary insight,
        KPI summary, latest recommendations for the campaign, suggested bid changes.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: campaign_external_id, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/product:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB product page
      description: Returns product context, primary insight, real cabinet evidence, and truthful missing-data state for the extension panel.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: product_wb_id, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/search:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB search results page
      description: Returns query context, primary insight, real cabinet bid/position evidence, and truthful missing-data state for the extension panel.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: phrase, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/evidence-summary:
    get:
      tags: [Extension]
      summary: Workspace extension evidence health summary
      description: Returns real captured cabinet evidence counts, freshness, issues, and next actions for the current workspace. It does not synthesize missing metrics. Ads read-model evidence uses explicit source labels such as API WB, Кабинет WB, API WB + кабинет WB, and surfaces API-vs-cabinet mismatch issues.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "200": { description: Evidence summary, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/evidence-debug:
    get:
      tags: [Extension]
      summary: Scoped extension evidence debug payload
      description: |
        Returns the latest real page contexts, allowlisted network captures,
        typed bid snapshots, position snapshots, DOM row snapshots, and UI
        signals for a campaign, product, or query. Use this for extension QA and seller support; the
        response never backfills missing spend, revenue, orders, or recommendations.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: scope, in: query, required: true, schema: { type: string, enum: [campaign, product, query] } }
        - { name: campaign_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: product_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: phrase_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: query, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
      responses:
        "200": { description: Evidence debug payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/evidence-debug/report:
    get:
      tags: [Extension]
      summary: Support-ready scoped evidence report
      description: |
        Returns a support-screen view model derived from the scoped real
        extension evidence debug payload: source label, readiness, evidence
        sections, checklist, issues, and next actions. The response is
        computed only from stored real cabinet evidence and never invents
        missing business metrics.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: scope, in: query, required: true, schema: { type: string, enum: [campaign, product, query] } }
        - { name: campaign_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: product_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: phrase_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: query, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
      responses:
        "200":
          description: Evidence support report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionEvidenceSupportReportEnvelope"

  # --- Workspace Settings ---
  /api/v1/settings:
    get:
      tags: [Settings]
      summary: Get workspace settings
      description: Returns the current workspace settings including recommendation thresholds and notification config. Requires owner or manager role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "200":
          description: Workspace settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSettingsEnvelope"
    put:
      tags: [Settings]
      summary: Update workspace settings
      description: Merges provided settings into workspace config. Supports partial updates — only non-null fields are overwritten. Requires owner or manager role.
      security:
        - bearerAuth: []
      parameters:
