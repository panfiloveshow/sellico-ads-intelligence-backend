    get:
      tags: [Ads]
      summary: Client-ready WB ads audit report
      description: |
        Builds a client/agency report from the real AdsOverview and active
        recommendations for the selected period. The response never fabricates
        rows or estimated business results; unavailable evidence is shown as a
        truthful data status in the report.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
        - { name: seller_cabinet_id, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Client audit report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [report_type, generated_at, report, data_status, recommendations]
                    properties:
                      report_type: { type: string, example: client_wb_ads_audit }
                      generated_at: { type: string, format: date-time }
                      date_from: { type: string, format: date }
                      date_to: { type: string, format: date }
                      report: { type: string }
                      data_status: { type: object }
                      recommendations: { type: integer }
                      attention_items: { type: integer }
                      active_campaigns: { type: integer }
                      campaigns: { type: integer }
                      products: { type: integer }
                      queries: { type: integer }

