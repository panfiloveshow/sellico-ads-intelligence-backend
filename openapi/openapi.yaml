openapi: 3.0.3
info:
  title: Sellico Ads Intelligence Backend API
  version: 0.1.0
  description: |
    Baseline OpenAPI contract for the Sellico Ads Intelligence Backend MVP.
    The spec documents canonical routes only. Compatibility aliases implemented
    in the router are intentionally omitted from this file.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Workspaces
  - name: Seller Cabinets
  - name: Campaigns
  - name: Phrases
  - name: Bids
  - name: Products
  - name: Positions
  - name: SERP
  - name: Recommendations
  - name: Exports
  - name: Audit Logs
  - name: Job Runs
  - name: Extension
  - name: Settings
  - name: Events
paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        "200":
          description: Critical dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyEnvelope"
        "503":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh auth tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/workspaces:
    get:
      tags: [Workspaces]
      summary: List current user's workspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Workspace page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Workspaces]
      summary: Create a workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/:
    get:
      tags: [Workspaces]
      summary: Get a workspace by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/members/:
    get:
      tags: [Workspaces]
      summary: List workspace members
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Member page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Workspaces]
      summary: Invite a workspace member
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/members/{memberId}:
    patch:
      tags: [Workspaces]
      summary: Update member role
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Workspaces]
      summary: Remove member from workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/seller-cabinets/:
    get:
      tags: [Seller Cabinets]
      summary: List seller cabinets in current workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cabinet page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Seller Cabinets]
      summary: Create a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSellerCabinetRequest"
      responses:
        "201":
          description: Cabinet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}:
    get:
      tags: [Seller Cabinets]
      summary: Get a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cabinet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Seller Cabinets]
      summary: Delete a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cabinet deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/campaigns:
    get:
      tags: [Seller Cabinets]
      summary: List campaigns for a cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Campaign page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/products:
    get:
      tags: [Seller Cabinets]
      summary: List products for a cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Product page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/sync:
    post:
      tags: [Seller Cabinets]
      summary: Trigger workspace sync for a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "202":
          description: Sync job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncTriggerEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/campaigns/:
    get:
      tags: [Campaigns]
      summary: List campaigns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: seller_cabinet_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Campaign page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}/stats:
    get:
      tags: [Campaigns]
      summary: List campaign stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Campaign stat page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStatListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}/phrases:
    get:
      tags: [Campaigns]
      summary: List phrases for campaign
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Phrase page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}/recommendations:
    get:
      tags: [Campaigns]
      summary: List recommendations for campaign
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/RecommendationType"
        - $ref: "#/components/parameters/RecommendationSeverity"
        - $ref: "#/components/parameters/RecommendationStatus"
      responses:
        "200":
          description: Recommendation page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  # --- Campaign actions (lifecycle + minus-/plus-phrase management) ---
  /api/v1/campaigns/{id}/start:
    post:
      tags: [Campaigns]
      summary: Start (activate) campaign in WB cabinet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Started, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/pause:
    post:
      tags: [Campaigns]
      summary: Pause campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Paused, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/stop:
    post:
      tags: [Campaigns]
      summary: Stop campaign permanently
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Stopped, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/bids:
    get:
      tags: [Campaigns]
      summary: Current bids (per phrase) for campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Bid list, content: { application/json: { schema: { type: object } } } }

  /api/v1/campaigns/{id}/bid-history:
    get:
      tags: [Campaigns]
      summary: Bid change history for campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - { name: date_from, in: query, schema: { type: string, format: date } }
        - { name: date_to, in: query, schema: { type: string, format: date } }
      responses:
        "200": { description: History entries, content: { application/json: { schema: { type: object } } } }

  /api/v1/campaigns/{id}/daily-stats:
    get:
      tags: [Campaigns]
      summary: Daily aggregated stats for campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        "200": { description: Per-day stats, content: { application/json: { schema: { type: object } } } }

  /api/v1/campaigns/{id}/plus-phrases:
    get:
      tags: [Campaigns]
      summary: List plus-phrases (forced-match search terms) for campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Plus-phrase list, content: { application/json: { schema: { type: object } } } }
    post:
      tags: [Campaigns]
      summary: Add plus-phrases (write-access required)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phrases: { type: array, items: { type: string } }
      responses:
        "200": { description: Added, content: { application/json: { schema: { type: object } } } }
        "403": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/plus-phrases/{phraseId}:
    delete:
      tags: [Campaigns]
      summary: Remove a plus-phrase
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - { name: phraseId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Removed }

  /api/v1/campaigns/{id}/minus-phrases:
    get:
      tags: [Campaigns]
      summary: List minus-phrases (negative keywords)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Minus-phrase list, content: { application/json: { schema: { type: object } } } }
    post:
      tags: [Campaigns]
      summary: Add minus-phrases (write-access required)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phrases: { type: array, items: { type: string } }
      responses:
        "200": { description: Added, content: { application/json: { schema: { type: object } } } }
        "403": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/minus-phrases/{phraseId}:
    delete:
      tags: [Campaigns]
      summary: Remove a minus-phrase
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - { name: phraseId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Removed }

  /api/v1/recommendations/{id}/apply:
    post:
      tags: [Recommendations]
      summary: Apply a recommendation (executes the suggested action against WB)
      description: |
        Atomically applies the suggested change (e.g. raise/lower bid,
        add minus-phrase). On success the recommendation status flips to
        `applied`. The actual WB API call uses the cabinet's stored token.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationEnvelope"
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "409":
          description: Cannot apply (recommendation already resolved/dismissed, or upstream WB error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/phrases/:
    get:
      tags: [Phrases]
      summary: List phrases
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: campaign_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Phrase page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/phrases/{id}:
    get:
      tags: [Phrases]
      summary: Get phrase by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Phrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/phrases/{id}/stats:
    get:
      tags: [Phrases]
      summary: List phrase stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Phrase stat page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseStatListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/phrases/{id}/bids:
    get:
      tags: [Phrases]
      summary: List phrase bid history
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Bid snapshot page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidSnapshotListEnvelope"
        "400":
