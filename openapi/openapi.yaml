        seller_cabinet_id:
          type: string
          format: uuid
        wb_campaign_id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
        campaign_type:
          type: integer
        bid_type:
          type: string
        payment_type:
          type: string
        daily_budget:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CampaignStat:
