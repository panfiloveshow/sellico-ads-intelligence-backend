          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceQuarantineListEnvelope" }
  /api/v1/prices/cabinets-status:
    get:
      tags: [Repricer]
      summary: List WB price-scope readiness for seller cabinets
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      responses:
        "200":
          description: Cabinet price-scope statuses
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CabinetPricesScopeListEnvelope" }
  /api/v1/prices/heatmap:
    get:
      tags: [Repricer]
      summary: Get the 7 by 24 order heatmap used for price scheduling
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/SellerCabinetIdQueryRequired"
        - name: wb_product_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: metric
          in: query
          schema: { type: string, enum: [units, orders, revenue], default: units }
      responses:
        "200":
          description: Orders heatmap
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrdersHeatmapEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/prices/health:
    get:
      tags: [Repricer]
      summary: Get repricer health for one cabinet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/SellerCabinetIdQueryRequired"
      responses:
        "200":
          description: Repricer health
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepricerHealthEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/prices/pause:
    post:
      tags: [Repricer]
      summary: Pause or resume automatic repricing for a cabinet
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RepricerPauseRequest" }
      responses:
        "200": { description: Pause state updated }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "403": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/price-changes:
    get:
      tags: [Repricer]
      summary: List repricer price-change history
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/SellerCabinetIdQuery"
        - name: wb_product_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
        - name: source
          in: query
          schema: { type: string, enum: [strategy, manual, rollback, schedule] }
        - name: status
          in: query
          schema: { type: string, enum: [recommended, pending, submitting, submit_unknown, uploaded, applied, failed, rolled_back] }
      responses:
        "200":
          description: Price-change page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceChangeListEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/price-changes/{changeId}/rollback:
    post:
      tags: [Repricer]
      summary: Roll back an applied price change
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - name: changeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Rollback accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceChangeEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "403": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/price-upload-tasks:
    get:
      tags: [Repricer]
      summary: List recent WB price upload tasks
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/SellerCabinetIdQuery"
      responses:
        "200":
          description: Upload-task page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceUploadTaskListEnvelope" }
  /api/v1/price-schedules:
    get:
      tags: [Repricer]
      summary: List scheduled price changes
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/SellerCabinetIdQuery"
        - name: status
          in: query
          schema: { type: string, enum: [planned, executing, done, failed, canceled] }
      responses:
        "200":
          description: Price-schedule page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceScheduleListEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
    post:
      tags: [Repricer]
      summary: Schedule a future price change
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PriceScheduleInput" }
      responses:
        "201":
          description: Price schedule created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceScheduleEnvelope" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "403": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/price-schedules/{scheduleId}:
    delete:
      tags: [Repricer]
      summary: Cancel a planned price schedule
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - name: scheduleId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Schedule canceled }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "403": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/repricer/run:
    post:
      tags: [Repricer]
      summary: Enqueue an immediate repricer automation run
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      responses:
        "202": { description: Repricer run enqueued }
        "403": { $ref: "#/components/responses/ErrorResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceHeader:
      name: X-Workspace-ID
      in: header
      required: true
      description: Active workspace for tenant-scoped endpoints.
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    DateFrom:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    SellerCabinetIdQuery:
      name: seller_cabinet_id
      in: query
      schema:
        type: string
        format: uuid
    SellerCabinetIdQueryRequired:
      name: seller_cabinet_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    RecommendationType:
      name: type
      in: query
      schema:
        type: string
    RecommendationSeverity:
      name: severity
      in: query
      schema:
        type: string
    RecommendationStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [active, applying, apply_unknown, completed, dismissed, invalidated]
    RecommendationTaskCategory:
      name: task_category
      in: query
      schema:
        type: string
        enum: [losses, growth, card_tasks, api_risks]
    RecommendationTaskOwnerRole:
      name: task_owner_role
      in: query
      schema:
        type: string
        enum: [marketer, marketplace_manager, content, seo, technical_specialist]
    RecommendationOverdue:
      name: overdue
      in: query
      schema:
        type: boolean
  responses:
    ErrorResponse:
      description: API error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Meta:
      type: object
      required: [page, per_page, total]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
          format: int64
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        field:
          type: string
    ErrorEnvelope:
      type: object
      required: [errors]
      properties:
        data:
          nullable: true
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    EmptyEnvelope:
      type: object
      properties:
        data:
          nullable: true
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    StatusPayload:
      type: object
      required: [status]
      properties:
        status:
          type: string
    StatusEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/StatusPayload"
    ReadyPayload:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready
    ReadyEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ReadyPayload"

    AuthTokens:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    User:
      type: object
      required: [id, email, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Workspace:
      type: object
      required: [id, name, slug, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    WorkspaceMember:
      type: object
      required: [id, workspace_id, user_id, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, manager, analyst, viewer]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SellerCabinet:
      type: object
      required: [id, workspace_id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SellerCabinetCommunicationReputation:
      type: object
      required: [seller_cabinet_id, wb_product_id, source, generated_at, is_answered, new_items, counts, questions, feedbacks]
      properties:
        seller_cabinet_id:
          type: string
          format: uuid
        wb_product_id:
          type: integer
          format: int64
        source:
          type: string
          enum: [wb_user_communication_api]
        generated_at:
          type: string
          format: date-time
        is_answered:
          type: boolean
        new_items:
          $ref: "#/components/schemas/SellerCabinetCommunicationNewItems"
        counts:
          $ref: "#/components/schemas/SellerCabinetCommunicationCounts"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/SellerCabinetQuestionEvidence"
        feedbacks:
          type: array
          items:
            $ref: "#/components/schemas/SellerCabinetFeedbackEvidence"
    SellerCabinetCommunicationNewItems:
      type: object
      required: [has_new_questions, has_new_feedbacks]
      properties:
        has_new_questions:
          type: boolean
        has_new_feedbacks:
          type: boolean
    SellerCabinetCommunicationCounts:
      type: object
      required: [unanswered_questions, unanswered_questions_today, unanswered_feedbacks, unanswered_feedbacks_today]
      properties:
        unanswered_questions:
          type: integer
        unanswered_questions_today:
          type: integer
        unanswered_feedbacks:
          type: integer
        unanswered_feedbacks_today:
          type: integer
    SellerCabinetCommunicationProductDetails:
      type: object
      required: [nm_id]
      properties:
        imt_id:
          type: integer
          format: int64
        nm_id:
          type: integer
          format: int64
        product_name:
          type: string
        supplier_article:
          type: string
        supplier_name:
          type: string
        brand_name:
          type: string
        size:
          type: string
    SellerCabinetCommunicationAnswer:
      type: object
      required: [editable]
      properties:
        text:
          type: string
        state:
          type: string
        editable:
          type: boolean
        create_date:
          type: string
    SellerCabinetQuestionEvidence:
      type: object
      required: [id, product_details, was_viewed, is_warned]
      properties:
        id:
          type: string
        text:
          type: string
        created_date:
          type: string
        state:
          type: string
        answer:
          $ref: "#/components/schemas/SellerCabinetCommunicationAnswer"
        product_details:
          $ref: "#/components/schemas/SellerCabinetCommunicationProductDetails"
        was_viewed:
          type: boolean
        is_warned:
          type: boolean
    SellerCabinetFeedbackEvidence:
      type: object
      required: [id, product_details, was_viewed]
      properties:
        id:
          type: string
        text:
          type: string
        pros:
          type: string
        cons:
          type: string
        product_valuation:
          type: integer
        created_date:
          type: string
        answer:
          $ref: "#/components/schemas/SellerCabinetCommunicationAnswer"
        state:
          type: string
        product_details:
          $ref: "#/components/schemas/SellerCabinetCommunicationProductDetails"
        was_viewed:
          type: boolean
        order_status:
          type: string
        subject_id:
          type: integer
          format: int64
        subject_name:
          type: string
    Campaign:
      type: object
      required:
        [id, workspace_id, seller_cabinet_id, wb_campaign_id, name, status, campaign_type, bid_type, payment_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        seller_cabinet_id:
          type: string
          format: uuid
        wb_campaign_id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
        campaign_type:
          type: integer
        bid_type:
          type: string
        payment_type:
          type: string
        daily_budget:
          type: integer
          format: int64
          nullable: true
        can_change_nms:
          type: boolean
          nullable: true
          description: Real WB restrictions.can_change_nms value. Null means WB did not report the restriction.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CampaignStat:
      type: object
      required: [id, campaign_id, date, impressions, clicks, spend, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        impressions:
          type: integer
          format: int64
        clicks:
          type: integer
          format: int64
        spend:
          type: integer
          format: int64
        orders:
          type: integer
          format: int64
          nullable: true
        revenue:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Phrase:
      type: object
      required: [id, campaign_id, workspace_id, wb_norm_query, keyword, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        wb_cluster_id:
          type: integer
          format: int64
          nullable: true
          deprecated: true
        wb_norm_query:
          type: string
        keyword:
          type: string
        count:
          type: integer
          nullable: true
        current_bid:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PhraseStat:
      type: object
      required: [id, phrase_id, date, impressions, clicks, spend, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        phrase_id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        impressions:
          type: integer
          format: int64
        clicks:
          type: integer
          format: int64
        spend:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Product:
      type: object
      required: [id, workspace_id, seller_cabinet_id, wb_product_id, title, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        seller_cabinet_id:
          type: string
          format: uuid
        wb_product_id:
          type: integer
          format: int64
        title:
          type: string
        brand:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        price:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Position:
      type: object
      required: [id, workspace_id, product_id, query, region, position, page, source, checked_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        query:
          type: string
        region:
          type: string
        position:
          type: integer
        page:
          type: integer
        source:
          type: string
        checked_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    PositionAggregate:
      type: object
      required: [product_id, query, region, average, date_from, date_to, sample_count]
      properties:
        product_id:
          type: string
          format: uuid
        query:
          type: string
        region:
          type: string
        average:
          type: number
          format: double
        date_from:
          type: string
          format: date-time
        date_to:
          type: string
          format: date-time
        sample_count:
          type: integer
    SERPResultItem:
      type: object
      required: [id, snapshot_id, position, wb_product_id, title, created_at]
      properties:
        id:
          type: string
          format: uuid
        snapshot_id:
          type: string
          format: uuid
        position:
          type: integer
        wb_product_id:
          type: integer
          format: int64
        title:
          type: string
        price:
          type: integer
          format: int64
          nullable: true
        rating:
          type: number
          format: double
          nullable: true
        reviews_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
    SERPSnapshot:
      type: object
      required: [id, workspace_id, query, region, total_results, scanned_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        query:
          type: string
        region:
          type: string
        total_results:
          type: integer
        scanned_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    SERPSnapshotDetail:
      allOf:
        - $ref: "#/components/schemas/SERPSnapshot"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SERPResultItem"
    BidSnapshot:
      type: object
      required: [id, phrase_id, workspace_id, competitive_bid, leadership_bid, cpm_min, captured_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        phrase_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        competitive_bid:
          type: integer
          format: int64
        leadership_bid:
          type: integer
          format: int64
        cpm_min:
          type: integer
          format: int64
        captured_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    BidEstimate:
      type: object
      required: [phrase_id, workspace_id, competitive_bid, leadership_bid, cpm_min, captured_at]
      properties:
        phrase_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        competitive_bid:
          type: integer
          format: int64
        leadership_bid:
          type: integer
          format: int64
        cpm_min:
          type: integer
          format: int64
        captured_at:
          type: string
          format: date-time
    Recommendation:
      type: object
      required: [id, workspace_id, title, description, type, severity, confidence, source_metrics, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
          nullable: true
        phrase_id:
          type: string
          format: uuid
          nullable: true
        product_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
        type:
          type: string
        severity:
          type: string
        confidence:
          type: number
          format: double
        source_metrics:
          type: object
          additionalProperties: true
        analysis_window:
          type: object
          description: Current real-data period used to calculate this recommendation.
          required: [date_from, date_to]
          properties:
            date_from: { type: string, format: date }
            date_to: { type: string, format: date }
        previous_window:
          type: object
          description: Equal preceding period used for comparison.
          required: [date_from, date_to]
          properties:
            date_from: { type: string, format: date }
            date_to: { type: string, format: date }
        confidence_factors:
          type: array
          description: Auditable factors used to calculate confidence; values are not model-generated.
          items:
            type: object
            required: [code, impact, reason]
            properties:
              code: { type: string }
              impact: { type: number, format: double }
              reason: { type: string }
        action:
          type: object
          description: Executability metadata. Missing means that a legacy recommendation has not been classified yet.
          required: [kind, can_apply, requires_confirmation]
          properties:
            kind: { type: string }
            can_apply: { type: boolean }
            requires_confirmation: { type: boolean }
            block_reason: { type: string, nullable: true }
        decision_basis:
          type: string
          description: Human-readable statement of the real metrics used for the decision.
        next_action:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, applying, apply_unknown, completed, dismissed, invalidated]
        task_category:
          type: string
          enum: [losses, growth, card_tasks, api_risks]
          description: Queue category for task-oriented recommendation views.
        task_owner_role:
          type: string
          enum: [marketer, marketplace_manager, content, seo, technical_specialist]
          description: Default team role responsible for the recommendation task.
        task_sla_hours:
          type: integer
          description: SLA window in hours before an active recommendation is overdue.
        task_due_at:
          type: string
          format: date-time
          nullable: true
          description: Deadline calculated from stored created_at and the recommendation task SLA.
        task_age_hours:
          type: integer
          description: Age of the recommendation task calculated from stored created_at.
        is_overdue:
          type: boolean
          description: True for active recommendations older than the task overdue threshold.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
