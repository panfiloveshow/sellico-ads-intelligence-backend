      tags: [Extension]
      summary: Submit a bid snapshot captured from the WB cabinet UI
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_external_id: { type: string }
                phrase: { type: string }
                bid: { type: integer, description: kopecks }
                captured_at: { type: string, format: date-time }
      responses:
        "201": { description: Snapshot stored, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/position-snapshots:
    post:
      tags: [Extension]
      summary: Submit a search-position snapshot captured from WB SERP
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_wb_id: { type: integer }
                phrase: { type: string }
                position: { type: integer }
                page: { type: integer }
                captured_at: { type: string, format: date-time }
      responses:
        "201": { description: Snapshot stored, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/ui-signals:
    post:
      tags: [Extension]
      summary: Generic UI interaction signal (clicks on bid input, etc.)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signal_type: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        "200": { description: Signal recorded, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/network-captures/batch:
    post:
      tags: [Extension]
      summary: Bulk-upload XHR captures from the extension's page-bridge
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                captures:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string }
                      method: { type: string }
                      status: { type: integer }
                      response_body: { type: string }
                      captured_at: { type: string, format: date-time }
      responses:
        "200": { description: Batch accepted, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/campaign:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB campaign page
      description: |
        Used by the extension's content script to render the floating
        Sellico widget overlaid on seller.wildberries.ru/campaigns/{id}.
        Returns the smallest payload needed for the widget — KPI summary,
        latest recommendations for the campaign, suggested bid changes.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: campaign_external_id, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/product:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB product page
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: product_wb_id, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  /api/v1/extension/widgets/search:
    get:
      tags: [Extension]
      summary: Compact widget data for a WB search results page
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: phrase, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Widget payload, content: { application/json: { schema: { type: object } } } }

  # --- Workspace Settings ---
  /api/v1/settings:
    get:
      tags: [Settings]
      summary: Get workspace settings
      description: Returns the current workspace settings including recommendation thresholds and notification config. Requires owner or manager role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "200":
          description: Workspace settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSettingsEnvelope"
    put:
      tags: [Settings]
      summary: Update workspace settings
      description: Merges provided settings into workspace config. Supports partial updates — only non-null fields are overwritten. Requires owner or manager role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceSettingsInput"
      responses:
        "200":
          description: Updated workspace settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSettingsEnvelope"

  /api/v1/settings/thresholds:
    get:
      tags: [Settings]
      summary: Get effective recommendation thresholds
      description: Returns recommendation thresholds with defaults applied for any unset values.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "200":
          description: Effective thresholds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdsEnvelope"

  # --- Ads Read (workspace KPI + entity summaries; main dashboard data source) ---
  /api/v1/ads/overview:
    get:
      tags: [Ads]
      summary: Workspace ads dashboard overview
      description: |
        Aggregated KPI view: current vs previous period metrics, top
        products / campaigns / queries, attention items, cabinet summaries.
        Used by the Command Center page.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
        - { name: seller_cabinet_id, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Aggregated dashboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: AdsOverview — see internal/domain.AdsOverview

  /api/v1/ads/products:
    get:
      tags: [Ads]
      summary: Per-product ads summaries
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
        - { name: seller_cabinet_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: title, in: query, required: false, schema: { type: string } }
        - { name: view, in: query, required: false, schema: { type: string, enum: [all, attention, top, underperforming] } }
      responses:
        "200":
          description: ProductAdsSummary list
          content:
            application/json:
              schema: { type: object }

  /api/v1/ads/products/{id}:
    get:
      tags: [Ads]
      summary: Single product ads summary
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        "200":
          description: ProductAdsSummary
          content: { application/json: { schema: { type: object } } }
        "404":
          description: Not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  /api/v1/ads/campaigns:
    get:
      tags: [Ads]
      summary: Per-campaign performance summaries
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
        - { name: seller_cabinet_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: name, in: query, required: false, schema: { type: string } }
        - { name: product_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: view, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: CampaignPerformanceSummary list
          content: { application/json: { schema: { type: object } } }

  /api/v1/ads/campaigns/{id}:
    get:
      tags: [Ads]
      summary: Single campaign performance summary
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        "200":
          description: CampaignPerformanceSummary
          content: { application/json: { schema: { type: object } } }
        "404":
          description: Not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  /api/v1/ads/queries:
    get:
      tags: [Ads]
      summary: Per-query (search phrase) performance summaries
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
        - { name: seller_cabinet_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: campaign_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: product_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: view, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: QueryPerformanceSummary list
          content: { application/json: { schema: { type: object } } }

  /api/v1/ads/queries/{id}:
    get:
      tags: [Ads]
      summary: Single query (phrase) performance summary
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Phrase UUID }
        - { name: date_from, in: query, required: true, schema: { type: string, format: date } }
        - { name: date_to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        "200":
          description: QueryPerformanceSummary
          content: { application/json: { schema: { type: object } } }
        "404":
          description: Not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  # --- SSE Events ---
  /api/v1/events:
    get:
      tags: [Events]
      summary: Server-Sent Events stream
      description: |
        Real-time workspace event stream via SSE. Events include sync_complete,
        recommendation_new, export_ready. Requires auth + workspace header.
        Connection stays open until client disconnects.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE event stream (event: type\\ndata: JSON\\n\\n)"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceHeader:
      name: X-Workspace-ID
      in: header
      required: true
      description: Active workspace for tenant-scoped endpoints.
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    DateFrom:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    RecommendationType:
      name: type
      in: query
      schema:
        type: string
    RecommendationSeverity:
      name: severity
      in: query
      schema:
        type: string
    RecommendationStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [active, completed, dismissed]
  responses:
    ErrorResponse:
      description: API error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Meta:
      type: object
      required: [page, per_page, total]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
          format: int64
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        field:
          type: string
    ErrorEnvelope:
      type: object
      required: [errors]
      properties:
        data:
          nullable: true
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    EmptyEnvelope:
      type: object
      properties:
        data:
          nullable: true
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    StatusPayload:
      type: object
      required: [status]
      properties:
        status:
          type: string
    StatusEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/StatusPayload"
    ReadyPayload:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready
    ReadyEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ReadyPayload"

    AuthTokens:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    User:
      type: object
      required: [id, email, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Workspace:
      type: object
      required: [id, name, slug, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    WorkspaceMember:
      type: object
      required: [id, workspace_id, user_id, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, manager, analyst, viewer]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SellerCabinet:
      type: object
      required: [id, workspace_id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Campaign:
      type: object
      required:
        [id, workspace_id, seller_cabinet_id, wb_campaign_id, name, status, campaign_type, bid_type, payment_type, created_at, updated_at]
      properties:
