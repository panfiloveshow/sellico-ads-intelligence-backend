  /api/v1/product-economics/import:
    post:
      tags: [Products]
      summary: Import manual product economics
      description: |
        Imports real seller-provided economics from JSON or CSV. JSON uses `{ "rows": [...] }`.
        CSV must include `wb_product_id` and may include `cost_price`, `logistics_cost`,
        `other_costs`, `tax_rate_percent`, `commission_percent`, `target_margin_percent`,
        `max_allowed_drr`, `source`, and `effective_at`.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rows]
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    required: [wb_product_id]
                    properties:
                      wb_product_id: { type: integer, format: int64 }
                      cost_price: { type: integer, format: int64, nullable: true }
                      logistics_cost: { type: integer, format: int64, nullable: true }
                      other_costs: { type: integer, format: int64, nullable: true }
                      tax_rate_percent: { type: number, nullable: true }
                      commission_percent: { type: number, nullable: true }
                      target_margin_percent: { type: number, nullable: true }
                      max_allowed_drr: { type: number, nullable: true }
                      source: { type: string }
                      effective_at: { type: string, format: date, nullable: true }
          text/csv:
            schema:
              type: string
      responses:
        "200": { description: Import result, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

