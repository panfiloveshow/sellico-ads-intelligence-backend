openapi: 3.0.3
info:
  title: Sellico Ads Intelligence Backend API
  version: 0.1.0
  description: |
    Baseline OpenAPI contract for the Sellico Ads Intelligence Backend MVP.
    The spec documents canonical routes only. Compatibility aliases implemented
    in the router are intentionally omitted from this file.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Workspaces
  - name: Seller Cabinets
  - name: Campaigns
  - name: Phrases
  - name: Bids
  - name: Products
  - name: Positions
  - name: SERP
  - name: Recommendations
  - name: Exports
  - name: Audit Logs
  - name: Job Runs
  - name: Extension
  - name: Settings
  - name: Events
  - name: Repricer
paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        "200":
          description: Critical dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyEnvelope"
        "503":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh auth tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/workspaces:
    get:
      tags: [Workspaces]
      summary: List current user's workspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Workspace page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Workspaces]
      summary: Create a workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/:
    get:
      tags: [Workspaces]
      summary: Get a workspace by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/members/:
    get:
      tags: [Workspaces]
      summary: List workspace members
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Member page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Workspaces]
      summary: Invite a workspace member
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceId}/members/{memberId}:
    patch:
      tags: [Workspaces]
      summary: Update member role
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Workspaces]
      summary: Remove member from workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/seller-cabinets/:
    get:
      tags: [Seller Cabinets]
      summary: List seller cabinets in current workspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cabinet page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetListEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Seller Cabinets]
      summary: Create a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSellerCabinetRequest"
      responses:
        "201":
          description: Cabinet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}:
    get:
      tags: [Seller Cabinets]
      summary: Get a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cabinet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Seller Cabinets]
      summary: Delete a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cabinet deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/campaigns:
    get:
      tags: [Seller Cabinets]
      summary: List campaigns for a cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Campaign page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/products:
    get:
      tags: [Seller Cabinets]
      summary: List products for a cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Product page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/communication/reputation:
    get:
      tags: [Seller Cabinets]
      summary: Read WB User Communication reputation evidence for a product
      description: Returns real questions, feedbacks, and unanswered counters from the official WB User Communication API. No sample or synthetic reputation data is generated.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - name: nm_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: take
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: is_answered
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Real WB communication evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerCabinetCommunicationReputationEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/seller-cabinets/{id}/sync:
    post:
      tags: [Seller Cabinets]
      summary: Trigger workspace sync for a seller cabinet
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "202":
          description: Sync job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncTriggerEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/campaigns/:
    get:
      tags: [Campaigns]
      summary: List campaigns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: seller_cabinet_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Campaign page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Campaigns]
      summary: Create WB campaign through Promotion API
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seller_cabinet_id, name, nm_ids]
              properties:
                seller_cabinet_id:
                  type: string
                  format: uuid
                name:
                  type: string
                  maxLength: 100
                nm_ids:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: integer
                    format: int64
                    minimum: 1
                bid_type:
                  type: string
                  enum: [manual, unified]
                  default: manual
                payment_type:
                  type: string
                  enum: [cpm, cpc]
                  default: cpm
                placement_types:
                  type: array
                  items:
                    type: string
                    enum: [search, recommendations]
      responses:
        "201":
          description: Campaign created in WB and saved locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Campaigns]
      summary: Delete ready campaign in WB cabinet
      description: Deletes a campaign through the official WB Promotion API. WB allows deletion only for campaigns in ready-to-launch status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Deleted, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /api/v1/campaigns/{id}/stats:
    get:
      tags: [Campaigns]
      summary: List campaign stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Campaign stat page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStatListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}/phrases:
    get:
      tags: [Campaigns]
      summary: List phrases for campaign
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Phrase page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/campaigns/{id}/recommendations:
    get:
      tags: [Campaigns]
      summary: List recommendations for campaign
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/RecommendationType"
        - $ref: "#/components/parameters/RecommendationSeverity"
        - $ref: "#/components/parameters/RecommendationStatus"
        - $ref: "#/components/parameters/RecommendationTaskCategory"
        - $ref: "#/components/parameters/RecommendationTaskOwnerRole"
        - $ref: "#/components/parameters/RecommendationOverdue"
      responses:
        "200":
          description: Recommendation page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationListEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  # --- Campaign actions (lifecycle + minus-/plus-phrase management) ---
  /api/v1/campaigns/{id}/start:
    post:
      tags: [Campaigns]
      summary: Start (activate) campaign in WB cabinet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Started, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/pause:
    post:
      tags: [Campaigns]
      summary: Pause campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Paused, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/stop:
    post:
      tags: [Campaigns]
      summary: Stop campaign permanently
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Stopped, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/name:
    patch:
      tags: [Campaigns]
      summary: Rename campaign in WB cabinet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
      responses:
        "200": { description: Renamed, content: { application/json: { schema: { type: object } } } }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/bids:
    get:
      tags: [Campaigns]
      summary: Current bids (per phrase) for campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Bid list, content: { application/json: { schema: { type: object } } } }

  /api/v1/campaigns/{id}/products:
    patch:
      tags: [Campaigns]
      summary: Add or delete product cards in a WB campaign
      description: >-
        Applies PATCH /adv/v0/auction/nms only when the latest real WB campaign
        restriction explicitly has can_change_nms=true. Unknown capability,
        stale/missing product links, unsupported campaign status, and active WB
        rate-limit cooldowns fail closed. A successful response requires a
        subsequent campaign sync before local product links are treated as current.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                add:
                  type: array
                  items: { type: integer, format: int64, minimum: 1 }
                delete:
                  type: array
                  items: { type: integer, format: int64, minimum: 1 }
      responses:
        "200":
          description: WB-confirmed product-card changes
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [advert_id, added, deleted, sync_required]
                    properties:
                      advert_id: { type: integer, format: int64 }
                      added: { type: array, items: { type: integer, format: int64 } }
                      deleted: { type: array, items: { type: integer, format: int64 } }
                      sync_required: { type: boolean, enum: [true] }
                  errors:
                    type: array
                    items: { $ref: "#/components/schemas/Error" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "429": { $ref: "#/components/responses/ErrorResponse" }
        "502": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/bids/min:
    get:
      tags: [Campaigns]
      summary: Minimum WB bids for campaign product cards
      description: Resolves payment and placement types from the latest synced real campaign settings, then calls the official WB minimum-bids endpoint.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
        - $ref: "#/components/parameters/Id"
        - name: nm_id
          in: query
          required: true
          schema:
            type: array
            minItems: 1
            maxItems: 100
            items: { type: integer, format: int64, minimum: 1 }
          style: form
          explode: true
      responses:
        "200":
          description: Minimum bids in kopecks per product and placement
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [nmId, placement, minBid]
                  properties:
                    nmId: { type: integer, format: int64 }
                    placement: { type: string, enum: [combined, search, recommendation] }
                    minBid: { type: integer, format: int64 }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }

  /api/v1/campaigns/{id}/daily-limit:
    get:
      tags: [Campaigns]
      summary: Get the campaign autopilot daily spend limit
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }, { $ref: "#/components/parameters/Id" }]
      responses:
        "200": { description: Daily limit, content: { application/json: { schema: { $ref: "#/components/schemas/CampaignDailyLimitEnvelope" } } } }
    put:
      tags: [Campaigns]
      summary: Set the campaign autopilot daily spend limit
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkspaceHeader" }, { $ref: "#/components/parameters/Id" }]
