# Development nginx config — HTTP only, no SSL.
# For production with HTTPS, mount nginx.prod.conf instead (see docker-compose.server.yml).

# Docker internal DNS resolver — re-resolves after container restarts (fixes 502)
resolver 127.0.0.11 valid=5s ipv6=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;

server {
    listen 80;
    server_name _;
    include /etc/nginx/conf.d/proxy.inc;
}
