# Production nginx config — HTTPS with HTTP→HTTPS redirect.
#
# Requirements before first start:
#   1) ./nginx/ssl/fullchain.pem and ./nginx/ssl/privkey.pem must exist on the host
#      (mounted read-only into the nginx container at /etc/nginx/ssl/).
#   2) DNS for $SERVER_NAME points at this host.
#   3) Bootstrap certs once via scripts/setup-ssl.sh (certbot --standalone), then
#      automated renewals via cron — see docs/deployment/ssl.md.
#
# server_name uses "_" (catch-all) so a single host serves whatever domain points at it.
# If you need strict host validation, replace _ with the actual FQDN.

# Docker internal DNS resolver — re-resolves after container restarts (fixes 502)
resolver 127.0.0.11 valid=5s ipv6=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;

# ACME http-01 challenge webroot — used by certbot --webroot for renewals.
# Files are placed by certbot under /var/www/certbot via a host bind mount.
# (see docker-compose.server.yml: ./nginx/acme:/var/www/certbot:ro)

# HTTP server — serves only ACME challenges and redirects everything else to HTTPS.
server {
    listen 80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — primary application traffic.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — only sent over HTTPS, so it lives in this server block, not in proxy.inc.
    # 1y duration, applies to subdomains, eligible for browser preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    include /etc/nginx/conf.d/proxy.inc;
}
