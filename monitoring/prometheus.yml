global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager wiring — currently disabled because the alertmanager service
# in docker-compose.prod.yml has profile "alerts" and is not started by default
# (requires ALERT_CHAT_ID + monitoring/alertmanager-secrets/bot_token to function).
#
# To enable alerting:
#  1. Set ALERT_CHAT_ID in .env
#  2. Place Telegram bot token at monitoring/alertmanager-secrets/bot_token
#  3. Uncomment the `alerting:` block below
#  4. Bring up: `docker compose --profile alerts up -d alertmanager`
#  5. Reload prometheus: `docker compose kill -s HUP prometheus`
#
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# Alert rules are loaded but only evaluated; without alerting wired up they
# produce no notifications — useful for "what would have fired" inspection
# in the prometheus UI.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "sellico-api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 30s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s
