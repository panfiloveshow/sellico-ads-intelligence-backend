# Standalone nginx config for the frontend image.
# In the main prod stack, the root nginx container handles SSL + serves the
# bundle directly (see nginx/nginx.prod.conf — Sprint 6 will mount /var/www).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any route not matching a built asset returns index.html
    # so React Router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets, short-cache index.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
