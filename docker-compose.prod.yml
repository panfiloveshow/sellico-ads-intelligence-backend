# Production docker-compose — single source of truth.
#
# Hardening profile applied to every container:
#   security_opt: no-new-privileges  (kernel forbids escalation via setuid binaries)
#   cap_drop: ALL + targeted cap_add  (least-privilege Linux capabilities)
#   read_only: true with explicit tmpfs for runtime-writable paths
#
# Monitoring (prometheus, grafana, alertmanager) runs on the internal docker
# network only — no host ports. Reach grafana via nginx /admin/grafana/ (Sprint 4).
# For ad-hoc access use SSH tunnel: ssh -L 3000:grafana:3000 ops@host

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.inc:/etc/nginx/conf.d/proxy.inc:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/acme:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID", "DAC_OVERRIDE"]
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  migrate:
    image: migrate/migrate:v4.19.0
    command:
      - -path=/migrations
      - -database=${DATABASE_URL}
      - up
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true

  api:
    build:
      context: .
      args:
        TARGET: api
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      EXPORT_STORAGE_PATH: /app/exports
      # GOMEMLIMIT is also computed at startup from the cgroup limit
      # (internal/app/bootstrap.go) — this env var acts as an override.
      GOMEMLIMIT: 700MiB
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    build:
      context: .
      args:
        TARGET: worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      EXPORT_STORAGE_PATH: /app/exports
      GOMEMLIMIT: 350MiB
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/health/live >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 384M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sellico}
    command: postgres -c shared_buffers=128MB -c effective_cache_size=256MB -c work_mem=4MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellico}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETGID", "SETUID", "DAC_OVERRIDE", "FOWNER"]
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["SETGID", "SETUID"]
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Monitoring (internal-only; reach via nginx /admin/grafana or SSH tunnel) ---
  prometheus:
    image: prom/prometheus:v3.2.1
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.external-url=/admin/prometheus
      - --web.route-prefix=/
    depends_on:
      api:
        condition: service_healthy
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    expose:
      - "9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager-secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    environment:
      ALERT_CHAT_ID: ${ALERT_CHAT_ID}
      ONCALL_CHAT_ID: ${ONCALL_CHAT_ID:-${ALERT_CHAT_ID}}
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M

  # cAdvisor — per-container CPU / memory / oom event metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true # cAdvisor needs broad host access — accepted trade-off for visibility
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # node_exporter — host-level CPU / memory / disk / network metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/var/lib/node_exporter/textfile
    pid: host # required for some collectors (process-level stats)
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:11.5.2
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://api.sellico.ru/admin/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
  exports:
  prometheus_data:
  grafana_data:
  alertmanager_data:
