services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.inc:/etc/nginx/conf.d/proxy.inc:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.19.0
    command:
      - -path=/migrations
      - -database=postgres://sellico:sellico@postgres:5432/sellico?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  api:
    build:
      context: .
      args:
        TARGET: api
    # Direct access on 8080 for development; nginx proxies on 80 in production
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://sellico:sellico@postgres:5432/sellico?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      EXPORT_STORAGE_PATH: /app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        TARGET: worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://sellico:sellico@postgres:5432/sellico?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      EXPORT_STORAGE_PATH: /app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/health/live >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sellico
      POSTGRES_PASSWORD: sellico
      POSTGRES_DB: sellico
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellico"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-sellico}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  exports:
  prometheus_data:
  grafana_data:
